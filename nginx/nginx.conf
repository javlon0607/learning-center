server {
    listen 80;
    server_name _;  # Replace with your domain or IP

    # Docker's internal DNS resolver — required when using variables in fastcgi_pass
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend - React App
    location / {
        try_files $uri $uri/ /index.html;
    }

   # Backend API - PHP
    location /api/ {
        # Use variable so nginx re-resolves on each request (prevents stale IP after backend restart)
        # Must be BEFORE rewrite, because rewrite's "break" halts all rewrite-module directives after it
        set $backend "backend:9000";

        # Remove /api/ prefix and pass to backend
        rewrite ^/api/(.*)$ /$1 break;

        fastcgi_pass $backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_COOKIE $http_cookie;
        include fastcgi_params;

        # Additional FastCGI parameters
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_SSL $http_x_forwarded_ssl if_not_empty;
        fastcgi_param HTTPS $https if_not_empty;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
